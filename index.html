<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Jireh Mayorista</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-dark fixed-top">

        <div class="container">

            <div class="navbar-top">

                <span class="navbar-brand fw-bold">
                    🛒 <span id="navbar-brand-texto">Jireh Mayorista</span>
                </span>

                <button
                    class="btn btn-cart-top"
                    onclick="abrirCarrito()">

                    🛍️ <span id="cart-count">0</span>

                </button>

            </div>

            <div class="navbar-search-row">

                <div class="search-wrap">
                    <span class="search-icon">🔍</span>
                    <input
                        id="search"
                        class="form-control"
                        placeholder="Buscar producto..."
                        autocomplete="off"
                        oninput="buscarProductos()">
                    <button
                        id="search-clear"
                        class="search-clear"
                        type="button"
                        aria-label="Limpiar búsqueda"
                        onclick="limpiarBusqueda()">
                        ✕
                    </button>
                </div>

                <button
                    id="btn-descargar-pdf"
                    class="btn btn-pdf-top"
                    type="button"
                    onclick="descargarCatalogoPDF()"
                    title="Descargar en PDF los productos que se están mostrando">
                    📄 PDF
                </button>

            </div>

        </div>

    </nav>

    <!-- HERO -->

    <section class="hero" id="hero">
        <div class="container text-center">

            <h1 class="display-5 fw-bold" id="hero-titulo">
                Mayorista Jireh
            </h1>

            <p class="lead" id="hero-subtitulo">
                Catálogo Mayorista Online
            </p>

        </div>
    </section>

    <section class="beneficios">

        <div class="container">

            <div class="row text-center gy-2" id="beneficios-row">

                <div class="col-md-2 col-6" id="beneficio-instagram-wrap">
                    <a href="#" id="beneficio-instagram" class="beneficio-item beneficio-link" target="_blank" rel="noopener">
                        📷 <span id="beneficio-instagram-texto">Instagram</span>
                    </a>
                </div>

                <div class="col-md-2 col-6" id="beneficio-telefono1-wrap">
                    <a href="#" id="beneficio-telefono1" class="beneficio-item beneficio-link">
                        📞 <span id="beneficio-telefono1-texto"></span>
                    </a>
                </div>

                <div class="col-md-2 col-6" id="beneficio-telefono2-wrap">
                    <a href="#" id="beneficio-telefono2" class="beneficio-item beneficio-link">
                        📞 <span id="beneficio-telefono2-texto"></span>
                    </a>
                </div>

                <div class="col-md-2 col-6" id="beneficio-direccion-wrap">
                    <span class="beneficio-item">
                        📍 <span id="beneficio-direccion-texto"></span>
                    </span>
                </div>

                <div class="col-md-2 col-6" id="beneficio-texto1-wrap">
                    <span class="beneficio-item" id="beneficio-texto1"></span>
                </div>

                <div class="col-md-2 col-6" id="beneficio-texto2-wrap">
                    <span class="beneficio-item" id="beneficio-texto2"></span>
                </div>

            </div>

        </div>

    </section>

    <!-- CATEGORÍAS -->

    <section class="container categorias-section">
        <div id="categoria-chips" class="chip-scroll" role="tablist" aria-label="Filtrar por categoría"></div>
    </section>

    <!-- PRODUCTOS -->

    <section class="container">

        <div id="resultados-info" class="resultados-info"></div>

        <div id="productos" class="row"></div>

        <div id="sin-resultados" class="sin-resultados d-none">
            <div class="sin-resultados-icon">🔍</div>
            <h5>No encontramos productos</h5>
            <p>Probá con otra palabra o elegí otra categoría.</p>
            <button class="btn btn-outline-primary" onclick="limpiarFiltros()">Quitar filtros</button>
        </div>

    </section>

    <!-- MODAL CARRITO -->

    <div class="modal fade" id="cartModal" tabindex="-1">

        <div class="modal-dialog modal-dialog-scrollable">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">
                        🛍️ Tu carrito
                    </h5>

                    <button
                        class="btn-close"
                        data-bs-dismiss="modal"
                        aria-label="Cerrar">
                    </button>

                </div>

                <div class="modal-body">

                    <div id="cart-items"></div>

                    <div id="cart-empty" class="cart-empty d-none">
                        <div class="cart-empty-icon">🛒</div>
                        <p>Tu carrito está vacío.</p>
                    </div>

                    <hr>

                    <div class="cart-total-row">
                        <span>Total</span>
                        <h5 class="mb-0">$<span id="cart-total">0</span></h5>
                    </div>

                    <hr>

                    <p class="form-section-label">Datos para el pedido</p>

                    <input
                        type="text"
                        id="clienteNombre"
                        class="form-control mb-2"
                        placeholder="Nombre y Apellido *">

                    <input
                        type="text"
                        id="clienteEmpresa"
                        class="form-control mb-2"
                        placeholder="Empresa (opcional)">

                    <input
                        type="text"
                        id="clienteDireccion"
                        class="form-control mb-2"
                        placeholder="Dirección *">

                    <div class="row g-2 mb-2">
                        <div class="col-6">
                            <input
                                type="text"
                                id="clienteLocalidad"
                                class="form-control"
                                placeholder="Localidad *">
                        </div>
                        <div class="col-6">
                            <input
                                type="text"
                                id="clienteProvincia"
                                class="form-control"
                                placeholder="Provincia *">
                        </div>
                    </div>

                    <input
                        type="text"
                        id="clienteCodigoPostal"
                        class="form-control mb-2"
                        placeholder="Código Postal (opcional)">

                    <input
                        type="tel"
                        id="clienteTelefono"
                        class="form-control mb-2"
                        placeholder="Teléfono *">

                    <input
                        type="text"
                        id="clienteDni"
                        class="form-control mb-2"
                        placeholder="DNI o CUIT *">

                </div>

                <div class="modal-footer">

                    <button
                        class="btn btn-danger"
                        onclick="vaciarCarrito()">
                        Vaciar carrito
                    </button>

                    <button
                        id="btn-checkout"
                        class="btn btn-success"
                        onclick="checkoutWhatsapp()">
                        <span class="btn-checkout-spinner"></span>
                        <span id="btn-checkout-texto">Enviar pedido por WhatsApp</span>
                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- MODAL VISTA RÁPIDA -->

    <div class="modal fade" id="quickViewModal" tabindex="-1">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="qv-titulo"></h5>
                    <button class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>

                <div class="modal-body">

                    <img id="qv-imagen" src="" alt="" class="qv-img">

                    <small id="qv-categoria" class="text-muted d-block mt-2"></small>

                    <div class="price mt-1" id="qv-precio"></div>

                    <div id="qv-stock" class="stock-badge d-none"></div>

                    <div class="qty-stepper mt-3">
                        <button class="qty-btn" onclick="cambiarQtyInput('qv-cantidad',-1)" aria-label="Restar">−</button>
                        <input type="number" id="qv-cantidad" class="qty-input" value="1" min="1">
                        <button class="qty-btn" onclick="cambiarQtyInput('qv-cantidad',1)" aria-label="Sumar">+</button>
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-primary w-100" id="qv-agregar">
                        🛒 Agregar al carrito
                    </button>
                </div>

            </div>

        </div>

    </div>

    <!-- TOASTS -->
    <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

    <!-- BARRA INFERIOR CARRITO (MOBILE) -->
    <button id="mobile-cart-bar" class="mobile-cart-bar d-none" onclick="abrirCarrito()">
        <span class="mcb-left">
            🛍️ <span id="mcb-count">0</span> producto(s)
        </span>
        <span class="mcb-right">
            Ver carrito · $<span id="mcb-total">0</span>
        </span>
    </button>

    <!-- VOLVER ARRIBA -->
    <button id="scroll-top-btn" class="scroll-top-btn d-none" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Volver arriba">
        ↑
    </button>

    <!-- SCRIPTS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="js/app.js"></script>

    <a
        id="whatsapp-float-btn"
        href="https://wa.me/5491140975795"
        target="_blank"
        rel="noopener"
        class="whatsapp-float-text"
        aria-label="Ayuda por WhatsApp">

        <img
            src="https://cdn-icons-png.flaticon.com/512/733/733585.png"
            alt=""
            width="28"
            height="28"
            loading="lazy">

        <span>¿Necesitás ayuda?</span>

    </a>

</body>

</html>
