<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jireh Mayorista</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- NAVBAR -->

   <nav class="navbar navbar-dark fixed-top">

    <div class="container">

        <span class="navbar-brand fw-bold">
            🛒 Jireh Mayorista
        </span>

        <div class="d-flex flex-grow-1 mx-3 gap-2">

            <input
                id="search"
                class="form-control"
                placeholder="🔍 Buscar producto..."
                onkeyup="buscarProductos()">

            <select
                id="categorias"
                class="form-select"
                onchange="filtrarCategoria()">

                <option value="">
                    Todas las categorías
                </option>

            </select>

        </div>

        <button
            class="btn btn-success"
            onclick="abrirCarrito()">

            Carrito (<span id="cart-count">0</span>)

        </button>

    </div>

</nav>

    <!-- HERO -->

    <section class="hero py-5">
        <div class="container text-center">

            <h1 class="display-5 fw-bold">
                Mayorista Jireh
            </h1>

            <p class="lead">
                Catálogo Mayorista Online
            </p>

        </div>
    </section>
<section class="beneficios">

    <div class="container">

        <div class="row text-center">

            <div class="col-md-3 col-6 mb-3">
                ✅ Stock actualizado
            </div>

            <div class="col-md-3 col-6 mb-3">
                🚚 Envíos a todo el país
            </div>

            <div class="col-md-3 col-6 mb-3">
                📦 Venta mayorista
            </div>

            <div class="col-md-3 col-6 mb-3">
                💬 Pedidos por WhatsApp al 1140975795 - 1134724637
            </div>

        </div>

    </div>

</section>

    <!-- PRODUCTOS -->

    <section class="container">

        <div id="productos" class="row"></div>

    </section>

    <!-- MODAL CARRITO -->

    <div class="modal fade" id="cartModal" tabindex="-1">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">
                        Carrito
                    </h5>

                    <button
                        class="btn-close"
                        data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <div id="cart-items"></div>

                    <hr>

                    <h5>
                        Total: $
                        <span id="cart-total">0</span>
                    </h5>

                    <hr>

                    <input
                        type="text"
                        id="clienteNombre"
                        class="form-control mb-2"
                        placeholder="Nombre y Apellido">

                    <input
                        type="text"
                        id="clienteEmpresa"
                        class="form-control mb-2"
                        placeholder="Empresa (opcional)">

                    <input
                        type="text"
                        id="clienteDireccion"
                        class="form-control mb-2"
                        placeholder="Dirección">

                    <input
                        type="text"
                        id="clienteTelefono"
                        class="form-control mb-2"
                        placeholder="Teléfono">

                    <input
                        type="text"
                        id="clienteDni"
                        class="form-control mb-2"
                        placeholder="DNI o CUIT">

                </div>

                <div class="modal-footer">

                    <button
                        class="btn btn-danger"
                        onclick="vaciarCarrito()">
                        Vaciar carrito
                    </button>

                    <button
                        class="btn btn-success"
                        onclick="checkoutWhatsapp()">
                        Enviar Pedido
                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- SCRIPTS -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/app.js"></script>
    <a
    href="https://wa.me/5491140975795"
    target="_blank"
    class="whatsapp-float-text">

    <img
        src="https://cdn-icons-png.flaticon.com/512/733/733585.png"
        alt="WhatsApp">

    <span>¿Necesitas ayuda?</span>

</a>

</body>

</html>
