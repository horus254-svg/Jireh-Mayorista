<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Jireh Mayorista</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<div class="header-fijo">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">

        <span class="navbar-brand">
            🛒 Jireh Mayorista
        </span>

        <button class="btn btn-success" onclick="abrirCarrito()">
            Carrito (<span id="cart-count">0</span>)
        </button>
        <button onclick="descargarCatalogo()" class="btn btn-success">
📄 Descargar catálogo
</button>

    </div>
</nav>

<div class="container py-3">

    <div class="row">

        <div class="col-12 col-md-6">
            <input
                id="search"
                class="form-control"
                placeholder="Buscar producto..."
                onkeyup="buscarProductos()">
        </div>

        <div class="col-12 col-md-6">
            <select
                id="categorias"
                class="form-select"
                onchange="filtrarCategoria()">

                <option value="">
                    Todas las categorías
                </option>
            </select>
        </div>

    </div>

</div>


</div>
<div class="container mt-4">

    <div id="productos" class="row"></div>

</div>
<!-- Modal carrito -->

<div
class="modal fade"
id="cartModal"
tabindex="-1">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5>Carrito</h5>

<button
class="btn-close"
data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

    <div id="cart-items"></div>

    <hr>

    <h5>
        Total:
        $
        <span id="cart-total">0</span>
    </h5>

    <hr>

    <input
    type="text"
    id="clienteNombre"
    class="form-control mb-2"
    placeholder="Nombre y Apellido">

    <input
    type="text"
    id="clienteEmpresa"
    class="form-control mb-2"
    placeholder="Empresa (opcional)">

   <input
type="text"
id="clienteDireccion"
class="form-control mb-2"
placeholder="Dirección">
<div class="mb-2">
    <input
        type="text"
        id="clienteTelefono"
        class="form-control"
        placeholder="Teléfono">
</div>

<input
type="text"
id="clienteDni"
class="form-control mb-2"
placeholder="DNI o CUIT">

<div class="modal-footer">

<button
class="btn btn-danger"
onclick="vaciarCarrito()">

Vaciar carrito

</button>

<button
class="btn btn-success"
onclick="checkoutWhatsapp()">

Enviar Pedido

</button>

</div>
</div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/app.js"></script>

</body>
</html>
