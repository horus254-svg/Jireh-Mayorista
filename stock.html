<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Gestión de Stock · Jireh Mayorista</title>
<meta name="theme-color" content="#0f1830">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --navy-900:#0f1830;
    --navy-950:#0a1020;
    --indigo-600:#3d5afe;
    --paper:#f6f3ec;
    --ink-900:#171a23;
    --ink-600:#5b6072;
    --line:#e4dfd2;
    --green-ok-bg:#dff5e3;
    --green-ok-text:#1c7a3c;
    --amber-low-bg:#fdecc8;
    --amber-low-text:#9a5b06;
    --red-out-bg:#fde2e2;
    --red-out-text:#b3261e;
}

*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html,body{
    margin:0; padding:0;
    min-height:100vh;
    font-family:'Inter', system-ui, sans-serif;
    background:var(--paper);
    color:var(--ink-900);
    -webkit-font-smoothing:antialiased;
}

/* ===== HEADER ===== */

header{
    position:sticky; top:0; z-index:20;
    background:var(--navy-900);
    color:#fff;
    padding:14px 16px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

header h1{
    font-family:'Space Grotesk', sans-serif;
    font-size:17px;
    margin:0 0 10px;
    display:flex; align-items:center; gap:8px;
}

#buscador{
    width:100%;
    padding:11px 14px;
    border-radius:10px;
    border:none;
    font-size:15px;
    font-family:inherit;
    background:rgba(255,255,255,.12);
    color:#fff;
}
#buscador::placeholder{ color:rgba(255,255,255,.55); }
#buscador:focus{ outline:2px solid var(--indigo-600); background:rgba(255,255,255,.18); }

#resultadosInfo{
    font-size:12px;
    color:rgba(255,255,255,.6);
    margin-top:8px;
}

/* ===== GRID ===== */

main{
    max-width:1200px;
    margin:0 auto;
    padding:16px;
}

#grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
    gap:14px;
}

.tarjeta{
    background:#fff;
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    transition:box-shadow .15s;
}
.tarjeta.guardando{ opacity:.7; }
.tarjeta.recien-guardado{ box-shadow:0 0 0 2px var(--green-ok-text); }

.tarjeta .foto{
    aspect-ratio:1/1;
    background:#f1ede2;
    display:flex; align-items:center; justify-content:center;
    font-size:34px;
    overflow:hidden;
}
.tarjeta .foto img{ width:100%; height:100%; object-fit:cover; display:block; }

.tarjeta .info{ padding:10px 10px 12px; }

.tarjeta .nombre{
    font-size:13px;
    font-weight:600;
    line-height:1.3;
    margin:0 0 2px;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
    min-height:34px;
}

.tarjeta .codigo{
    font-size:11px;
    color:var(--ink-600);
    font-family:monospace;
    margin-bottom:8px;
}

.stepper{
    display:flex;
    align-items:center;
    gap:6px;
}

.stepper button{
    width:34px; height:34px;
    border-radius:8px;
    border:1px solid var(--line);
    background:var(--paper);
    font-size:18px;
    font-weight:700;
    color:var(--navy-900);
    cursor:pointer;
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
}
.stepper button:active{ background:var(--indigo-600); color:#fff; }

.stepper input{
    flex:1;
    min-width:0;
    text-align:center;
    font-size:15px;
    font-weight:700;
    font-family:monospace;
    padding:7px 2px;
    border-radius:8px;
    border:1px solid var(--line);
}
.stepper input:focus{ outline:2px solid var(--indigo-600); }

.stepper input.stock-negativo{ background:var(--red-out-bg); color:var(--red-out-text); border-color:var(--red-out-text); }
.stepper input.stock-bajo{ background:var(--amber-low-bg); color:var(--amber-low-text); }
.stepper input.stock-ok{ background:var(--green-ok-bg); color:var(--green-ok-text); }

.estado-guardado{
    font-size:10.5px;
    text-align:center;
    margin-top:5px;
    height:13px;
    color:var(--green-ok-text);
}
.estado-guardado.error{ color:var(--red-out-text); }

#sinResultados, #cargando{
    text-align:center;
    color:var(--ink-600);
    padding:60px 20px;
    font-size:14px;
}

.toast-stack{
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    z-index:9999;
    display:flex; flex-direction:column; gap:8px;
    align-items:center;
}
.toast{
    background:var(--navy-950); color:#fff;
    padding:10px 18px; border-radius:10px;
    font-size:13.5px;
    box-shadow:0 4px 16px rgba(0,0,0,.25);
    animation:toast-in .2s ease;
}
.toast.error{ background:var(--red-out-text); }
.toast.success{ background:var(--green-ok-text); }
@keyframes toast-in{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:translateY(0); } }

/* ===== LOGIN ===== */

#pantallaLogin{
    position:fixed; inset:0; z-index:100;
    background:var(--navy-950);
    display:flex; align-items:center; justify-content:center;
    padding:24px;
}

.caja-login{
    width:100%; max-width:340px;
    background:var(--navy-900);
    border-radius:16px;
    padding:28px 24px;
    color:#fff;
    box-shadow:0 10px 40px rgba(0,0,0,.4);
}

.caja-login h2{
    font-family:'Space Grotesk', sans-serif;
    font-size:19px;
    margin:0 0 6px;
    text-align:center;
}
.caja-login p{
    font-size:13px;
    color:rgba(255,255,255,.55);
    text-align:center;
    margin:0 0 20px;
}

.caja-login input{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,.15);
    background:rgba(255,255,255,.08);
    color:#fff;
    font-size:15px;
    font-family:inherit;
    margin-bottom:10px;
}
.caja-login input::placeholder{ color:rgba(255,255,255,.4); }
.caja-login input:focus{ outline:2px solid var(--indigo-600); background:rgba(255,255,255,.12); }

.caja-login button{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    background:var(--indigo-600);
    color:#fff;
    font-size:15px;
    font-weight:600;
    font-family:inherit;
    cursor:pointer;
    margin-top:6px;
}
.caja-login button:disabled{ opacity:.6; }

#errorLogin{
    color:#ff8a8a;
    font-size:12.5px;
    text-align:center;
    margin-top:10px;
    min-height:16px;
}

#contenidoPrincipal{ display:none; }

</style>
</head>
<body>

<div id="pantallaLogin">
    <div class="caja-login">
        <h2>📦 Gestión de Stock</h2>
        <p>Ingresá la contraseña de depósito</p>
        <input type="password" id="loginPassword" placeholder="Contraseña" autocomplete="current-password">
        <button type="button" id="btnLogin" onclick="intentarLogin()">Ingresar</button>
        <div id="errorLogin"></div>
    </div>
</div>

<div id="contenidoPrincipal">
<header>
    <h1>📦 Gestión de Stock</h1>
    <input type="text" id="buscador" placeholder="🔍 Buscar por código o nombre..." oninput="filtrarYRenderizar()">
    <div id="resultadosInfo"></div>
</header>

<main>
    <div id="cargando">Cargando productos...</div>
    <div id="sinResultados" style="display:none;">No se encontraron productos.</div>
    <div id="grid"></div>
</main>

</div>

<div class="toast-stack" id="toastStack"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbw1eY_mXImG503rU0Cqddx1WBuGIOhxaW_SXGoIMsug_CjsSC-HLsb2XzYwrovaGBU/exec";

let productos = [];
let guardadoPendiente = {}; // codigo -> timeoutId, para debounce por tarjeta

/* ---------- login (contraseña propia, distinta de la del panel admin) ---------- */

function verificarSesion(){
    if(sessionStorage.getItem("stock_auth") === "true"){
        mostrarContenidoPrincipal();
    }else{
        document.getElementById("loginPassword").focus();
    }
}

async function intentarLogin(){
    const password = document.getElementById("loginPassword").value;
    const errorEl = document.getElementById("errorLogin");
    const btn = document.getElementById("btnLogin");

    if(!password){
        errorEl.textContent = "Ingresá la contraseña.";
        return;
    }

    btn.disabled = true;
    errorEl.textContent = "";

    try{
        const r = await fetchConTimeout(
            `${API_URL}?action=loginStock&password=${encodeURIComponent(password)}`,
            12000
        );
        const data = await r.json();

        if(data.success){
            sessionStorage.setItem("stock_auth", "true");
            mostrarContenidoPrincipal();
        }else{
            errorEl.textContent = "Contraseña incorrecta.";
        }
    }catch(error){
        console.error(error);
        errorEl.textContent = "Error de conexión — revisá internet e intentá de nuevo.";
    }finally{
        btn.disabled = false;
    }
}

// Enter en el campo de contraseña manda el login — más rápido en el celular.
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("loginPassword").addEventListener("keydown", e => {
        if(e.key === "Enter") intentarLogin();
    });
});

function mostrarContenidoPrincipal(){
    document.getElementById("pantallaLogin").style.display = "none";
    document.getElementById("contenidoPrincipal").style.display = "block";
    cargarProductos();
}

/* ---------- utilidades ---------- */

function escapeHtml(t){
    const d = document.createElement("div");
    d.textContent = String(t ?? "");
    return d.innerHTML;
}

function normalizar(t){
    return String(t || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
}

function mostrarToast(mensaje, tipo){
    const stack = document.getElementById("toastStack");
    const el = document.createElement("div");
    el.className = "toast" + (tipo ? " " + tipo : "");
    el.textContent = mensaje;
    stack.appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

/* ---------- carga inicial ---------- */

// Reintentos simples con timeout — conexiones de depósito/celular
// suelen ser más inestables que las de una PC de local.
async function fetchConTimeout(url, timeoutMs){
    const controlador = new AbortController();
    const timer = setTimeout(() => controlador.abort(), timeoutMs || 12000);
    try{
        const r = await fetch(url, { signal: controlador.signal });
        clearTimeout(timer);
        return r;
    }catch(e){
        clearTimeout(timer);
        throw e;
    }
}

async function cargarProductos(){
    try{
        const res = await fetchConTimeout(API_URL + "?action=productosAdmin", 15000);
        const data = await res.json();
        productos = data.productos || [];
        document.getElementById("cargando").style.display = "none";
        filtrarYRenderizar();
    }catch(error){
        console.error(error);
        document.getElementById("cargando").textContent = "No se pudo cargar el catálogo — revisá la conexión y recargá la página.";
    }
}

/* ---------- filtro y render ---------- */

function filtrarYRenderizar(){
    const termino = normalizar(document.getElementById("buscador").value);

    const lista = !termino ? productos : productos.filter(p =>
        normalizar(p.CODIGO).includes(termino) || normalizar(p.PRODUCTO).includes(termino)
    );

    const info = document.getElementById("resultadosInfo");
    info.textContent = lista.length === productos.length
        ? `${productos.length} productos`
        : `${lista.length} de ${productos.length} productos`;

    const grid = document.getElementById("grid");
    const sinResultados = document.getElementById("sinResultados");

    if(lista.length === 0){
        grid.innerHTML = "";
        sinResultados.style.display = "block";
        return;
    }
    sinResultados.style.display = "none";

    // Render simple (sin chunking): estas tarjetas son livianas
    // (solo foto + nombre + stepper), y esta página es para uso
    // interno de depósito, no para catálogos de miles de productos.
    grid.innerHTML = lista.map(p => tarjetaHtml(p)).join("");
}

function claseStock(stock){
    if(stock < 0) return "stock-negativo";
    if(stock <= 5) return "stock-bajo";
    return "stock-ok";
}

function tarjetaHtml(p){
    const stock = Number(p.STOCK ?? 0);
    const imagen = p.IMAGEN ? String(p.IMAGEN).trim() : "";
    const codigo = escapeHtml(p.CODIGO);

    return `
    <div class="tarjeta" id="tarjeta-${codigo}" data-codigo="${codigo}">
        <div class="foto">
            ${imagen
                ? `<img src="${imagen}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='📦';">`
                : "📦"}
        </div>
        <div class="info">
            <p class="nombre">${escapeHtml(p.PRODUCTO)}</p>
            <div class="codigo">${codigo}</div>
            <div class="stepper">
                <button type="button" onclick="cambiarStock('${codigo}', -1)" aria-label="Restar">−</button>
                <input type="number" step="1" class="${claseStock(stock)}" id="stock-${codigo}" value="${stock}"
                    onchange="guardarStockDesdeInput('${codigo}')">
                <button type="button" onclick="cambiarStock('${codigo}', 1)" aria-label="Sumar">+</button>
            </div>
            <div class="estado-guardado" id="estado-${codigo}"></div>
        </div>
    </div>`;
}

/* ---------- edición de stock ---------- */

function cambiarStock(codigo, delta){
    const input = document.getElementById("stock-" + codigo);
    const nuevo = (Number(input.value) || 0) + delta;
    input.value = nuevo;
    input.className = claseStock(nuevo);
    programarGuardado(codigo, nuevo);
}

function guardarStockDesdeInput(codigo){
    const input = document.getElementById("stock-" + codigo);
    const nuevo = Number(input.value);
    if(isNaN(nuevo)){ input.value = 0; return; }
    input.className = claseStock(nuevo);
    programarGuardado(codigo, nuevo);
}

// Debounce por tarjeta: si el cajero toca "+" varias veces seguidas,
// no se manda un guardado por cada click — se espera a que se
// detenga un instante y se manda uno solo con el valor final.
function programarGuardado(codigo, nuevoStock){
    if(guardadoPendiente[codigo]) clearTimeout(guardadoPendiente[codigo]);
    const estadoEl = document.getElementById("estado-" + codigo);
    if(estadoEl){ estadoEl.textContent = "Guardando..."; estadoEl.classList.remove("error"); }

    guardadoPendiente[codigo] = setTimeout(() => guardarStock(codigo, nuevoStock), 500);
}

async function guardarStock(codigo, nuevoStock){
    const producto = productos.find(p => String(p.CODIGO) === String(codigo));
    if(!producto){ return; }

    const tarjeta = document.getElementById("tarjeta-" + codigo);
    const estadoEl = document.getElementById("estado-" + codigo);
    if(tarjeta) tarjeta.classList.add("guardando");

    try{
        // actualizarProducto sobreescribe el producto entero — hay que
        // mandar todos los campos que ya tenía, no solo el stock, para
        // no perder categoría, imagen, publicado, destacado u oferta.
        const params = new URLSearchParams({
            action: "actualizarProducto",
            codigoOriginal: producto.CODIGO,
            CODIGO: producto.CODIGO,
            PRODUCTO: producto.PRODUCTO,
            CATEGORIA: producto.CATEGORIA || "",
            PRECIO: producto.PRECIO || 0,
            STOCK: nuevoStock,
            IMAGEN: producto.IMAGEN || "",
            PUBLICADO: producto.PUBLICADO || "SI",
            DESTACADO: producto.DESTACADO || "NO",
            OFERTA: producto.OFERTA || "NO"
        });

        const response = await fetchConTimeout(API_URL + "?" + params.toString(), 15000);
        const data = await response.json();

        if(!data.success){
            throw new Error(data.message || "No se pudo guardar");
        }

        producto.STOCK = nuevoStock;
        if(estadoEl){ estadoEl.textContent = "✓ Guardado"; estadoEl.classList.remove("error"); }
        if(tarjeta){
            tarjeta.classList.add("recien-guardado");
            setTimeout(() => tarjeta.classList.remove("recien-guardado"), 700);
        }
        setTimeout(() => { if(estadoEl && estadoEl.textContent === "✓ Guardado") estadoEl.textContent = ""; }, 2000);

    }catch(error){
        console.error("Error guardando stock:", error);
        if(estadoEl){ estadoEl.textContent = "⚠️ No se guardó — reintentá"; estadoEl.classList.add("error"); }
        mostrarToast(`No se pudo actualizar el stock de "${producto.PRODUCTO}" — revisá la conexión`, "error");
    }finally{
        if(tarjeta) tarjeta.classList.remove("guardando");
    }
}

verificarSesion();

</script>
</body>
</html>
